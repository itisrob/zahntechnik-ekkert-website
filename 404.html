<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">

<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<link rel="stylesheet" href="/css/style.css?v=3">
<script>
/* Redirect-Map: alte Framer-URLs -> neue statische Seiten (Domain-Umzug) */
(function () {
  var map = {
    "/über": "/ueber.html",
    "/uber": "/ueber.html",
    "/unser-service": "/leistungen.html",
    "/unser-service/schönheitsschiene": "/schoenheitsschiene.html",
    "/unser-service/schonheitsschiene": "/schoenheitsschiene.html",

    "/unser-service/valplast": "/valplast.html",
    "/unser-service/klammerprothese": "/klammerprothese.html",
    "/kontakt": "/kontakt.html",
    "/impressum": "/impressum.html",
    "/datenschutz": "/datenschutz.html"
  };
  var p = decodeURIComponent(location.pathname).toLowerCase().replace(/\/+$/, "");
  if (map[p]) { location.replace(map[p]); }
})();
</script>
</head>
