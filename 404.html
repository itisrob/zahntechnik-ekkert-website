<script>
/* Redirect-Map: alte Framer-URLs UND alte .html-URLs → neue saubere Ordner-URLs */
(function () {
  var map = {
    "/über": "/ueber/", "/uber": "/ueber/", "/ueber.html": "/ueber/",
    "/unser-service": "/leistungen/", "/leistungen.html": "/leistungen/",
    "/unser-service/schönheitsschiene": "/schoenheitsschiene/", "/unser-service/schonheitsschiene": "/schoenheitsschiene/", "/schoenheitsschiene.html": "/schoenheitsschiene/",

    "/unser-service/implantate": "/implantate/", "/implantate.html": "/implantate/",
    "/unser-service/zahnersatz": "/zahnersatz/", "/zahnersatz.html": "/zahnersatz/",
    "/unser-service/valplast": "/valplast/", "/valplast.html": "/valplast/",
    "/unser-service/klammerprothese": "/klammerprothese/", "/klammerprothese.html": "/klammerprothese/",
    "/kontakt": "/kontakt/", "/kontakt.html": "/kontakt/",
    "/impressum": "/impressum/", "/impressum.html": "/impressum/",
    "/datenschutz": "/datenschutz/", "/datenschutz.html": "/datenschutz/"
  };
  var p = decodeURIComponent(location.pathname).toLowerCase().replace(/\/+$/, "");
  if (map[p]) { location.replace(map[p]); }
})();
</script>

        &nbsp;
        <a class="btn btn--ghost btn--lg" href="/leistungen/">Meine Leistungen</a>
      </p>
    </div>
  </section>
</main>
</body>
</html>
